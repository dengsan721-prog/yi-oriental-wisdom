<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>艺｜看见命局，读懂时运</title><meta name="description" content="生辰排盘、五行十神、大运流年与关系合盘。"><style>
*{box-sizing:border-box}body{margin:0;background:#061019;color:#f4f1e8;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}button,input,select{font:inherit}.screen{min-height:100vh}.start{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:38px;background:radial-gradient(circle,#14384a,#061019 48%)}.mark{width:155px;height:155px;border-radius:50%;display:grid;place-items:center;border:1px solid #cbb27a70;box-shadow:0 0 80px #5aa5bb22;font:88px serif;color:#ebdcba;position:relative}.mark:after{content:"";position:absolute;inset:-28px;border:1px dashed #79b6c628;border-radius:50%}.start h1{font:400 clamp(35px,6vw,58px) serif;letter-spacing:.06em}.primary{min-height:48px;border:0;border-radius:99px;padding:0 24px;background:#d8e7eb;color:#09202c;font-weight:650}.hide{display:none!important}.intake,.result{padding:28px 6vw 80px;background:radial-gradient(circle at 10% 5%,#153748,#061019 33%)}.top{display:flex;justify-content:space-between;align-items:center}.top b{font:30px serif;color:#e0cca0}.top button{border:0;background:none;color:#9cafb7}.panel{width:min(900px,100%);margin:55px auto}.label{font-size:11px;letter-spacing:.18em;color:#cbb27a}.panel h1{font:400 clamp(38px,6vw,58px) serif;margin:12px 0}.muted{color:#899fa9}.identity{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:30px 0}.field span{display:block;color:#8da2ac;font-size:12px;margin-bottom:7px}.field input,.field select{width:100%;min-height:46px;padding:0 12px;border:1px solid #ffffff19;border-radius:11px;background:#ffffff08;color:white}.block{padding:22px 0;border-top:1px solid #ffffff13}.block>div:first-child{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.block input[type=number]{width:140px}.scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px}.scroll button,.grid button{flex:none;min-width:50px;min-height:44px;border:1px solid #ffffff15;border-radius:9px;background:#ffffff05;color:#91a6af}.scroll button.on,.grid button.on{background:#d8e7eb;color:#09202c}.grid{display:flex;flex-wrap:wrap;gap:7px}.days{max-height:145px;overflow-y:auto}.confirm{padding:18px;margin:20px 0;border-radius:14px;background:#ffffff07;display:flex;justify-content:space-between}.wide{width:100%}.loading{display:grid;place-items:center;text-align:center}.loading .mark{transform:scale(.7)}.loading p{color:#9db0b8}.result{padding-top:0}.result .top{height:70px;position:sticky;top:0;background:#061019dd;backdrop-filter:blur(14px);z-index:3}.result-wrap{padding:55px 0}.heading small{color:#78919b}.heading h1{font:400 clamp(45px,7vw,72px) serif;margin:14px 0}.heading p{color:#9fb1b9}.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:35px 0}.pillar{text-align:center;padding:17px 8px;border:1px solid #ffffff15;border-radius:16px;background:#0c1f2a}.pillar span{color:#8398a2;font-size:11px}.pillar strong{display:block;font:38px serif;line-height:1.15}.data{display:grid;grid-template-columns:1.2fr .8fr;gap:10px}.card{padding:22px;border:1px solid #ffffff11;border-radius:19px;background:#0b1d28}.bar{display:grid;grid-template-columns:25px 1fr 18px;align-items:center;gap:8px;margin:14px 0}.bar i,.domain i{height:6px;background:#ffffff0d;border-radius:6px;overflow:hidden}.bar i b,.domain i b{display:block;height:100%;background:linear-gradient(90deg,#58889c,#cbb27a)}.facts{display:grid;grid-template-columns:1fr 1fr}.fact{padding:16px;border-bottom:1px solid #ffffff0c}.fact span{display:block;color:#849aa4;font-size:11px}.fact strong{display:block;font:22px serif;margin-top:9px}.section{padding:65px 0}.section h2{font:400 40px serif;margin:10px 0 28px}.domains{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.domain{padding:20px;border:1px solid #ffffff10;border-radius:17px;background:#0b1d28}.domain small{color:#cbb27a}.domain h3{font:24px serif;margin:11px 0}.domain i{display:block;margin:18px 0}.domain p{color:#9cafb6;line-height:1.6}.timeline{display:grid;grid-template-columns:repeat(8,1fr);align-items:end;min-height:185px;border-bottom:1px solid #ffffff1c}.timeline div{text-align:center}.timeline i{display:block;width:3px;margin:auto;background:linear-gradient(#cbb27a,#2c6479)}.timeline b,.timeline span{display:block;margin-top:8px}.timeline span{font:19px serif;color:#8197a1}.relation-tabs{display:flex;gap:6px;flex-wrap:wrap}.relation-tabs button{min-height:44px;border:1px solid #ffffff18;border-radius:99px;padding:0 15px;background:#ffffff05;color:#8da3ad}.relation-tabs button.on{background:#d8e7eb;color:#09202c}.relation-card{margin-top:15px;padding:22px;border:1px solid #ffffff10;border-radius:18px;background:#0b1d28}.relation-card strong{font:25px serif}.relation-card p{color:#9cafb6}footer{padding:30px 0;border-top:1px solid #ffffff0d;color:#718892;font-size:11px}@media(max-width:700px){.intake,.result{padding-left:18px;padding-right:18px}.identity,.data{grid-template-columns:1fr}.pillars{grid-template-columns:repeat(4,1fr)}.pillar{padding:13px 4px}.pillar strong{font-size:31px}.domains{grid-template-columns:1fr}.timeline{overflow-x:auto;grid-template-columns:repeat(8,90px)}.confirm{flex-direction:column;gap:7px}.start h1{font-size:36px}.block>div:first-child{align-items:flex-start;flex-direction:column;gap:10px}.block input[type=number]{width:100%}}
</style></head><body><section id="start" class="screen start"><div class="mark">艺</div><h1>看见命局，读懂时运。</h1><button class="primary" onclick="show('intake')">开始排盘　→</button></section><section id="intake" class="screen intake hide"><header class="top"><button onclick="show('start')">← 返回</button><b>艺</b><span>生辰排盘</span></header><form class="panel" onsubmit="calculate(event)"><div class="label">建立出生坐标</div><h1>请选择出生年月日时</h1><p class="muted">年份可直接输入，也可按年代快速跳转。</p><div class="identity"><label class="field"><span>姓名</span><input id="name" required placeholder="请输入姓名"></label><label class="field"><span>出生地点</span><input id="location" value="杭州" required></label></div><div class="block"><div><b>年份</b><label class="field"><span>直接输入</span><input id="yearInput" type="number" min="1900" max="2026" value="1990" oninput="setYear(+this.value)"></label></div><div id="decades" class="scroll"></div><div id="years" class="grid"></div></div><div class="block"><div><b>月份</b></div><div id="months" class="grid"></div></div><div class="block"><div><b>日期</b></div><div id="days" class="grid days"></div></div><div class="block"><div><b>出生时间</b></div><div class="identity"><label class="field"><span>小时／时辰</span><select id="hour"></select></label><label class="field"><span>分钟</span><select id="minute"><option>00</option><option>15</option><option selected>30</option><option>45</option></select></label></div></div><div class="confirm"><span id="dateText"></span><b id="timeText"></b></div><button class="primary wide" type="submit">生成命盘　→</button></form></section><section id="loading" class="screen loading hide"><div><div class="mark">艺</div><p>四柱 · 五行 · 十神 · 格局 · 喜忌 · 大运</p></div></section><section id="result" class="screen result hide"><header class="top"><div><b>艺</b>　<span id="navName"></span>的命盘</div><button onclick="show('intake')">重新排盘</button></header><main class="result-wrap"><div class="heading"><small id="birthLine"></small><h1 id="mainTitle"></h1><p id="mainSummary"></p></div><div id="pillars" class="pillars"></div><div class="data"><article class="card"><b>五行旺衰</b><div id="elements"></div></article><article class="card facts" id="facts"></article></div><section class="section"><div class="label">六大命理</div><h2>人生各宫位趋势</h2><div id="domains" class="domains"></div></section><section class="section"><div class="label">大运流年</div><h2>十年一步，观势而行</h2><div id="timeline" class="timeline"></div></section><section class="section"><div class="label">关系合盘</div><h2>两个人的命局互动</h2><div class="relation-tabs"><button class="on">伴侣／婚姻</button><button>亲子</button><button>商业伙伴</button><button>朋友</button></div><div class="relation-card"><label class="field"><span>对方出生年份</span><input id="otherYear" type="number" min="1900" max="2026" value="1992" oninput="updateRelation()"></label><h3><strong id="relationTone"></strong></h3><p id="relationAdvice"></p></div></section><footer>传统文化体验与自我观察参考，不作为重大人生决策依据。</footer></main></section><script>
let year=1990,month=6,day=15,decade=1990;const now=new Date().getFullYear(),stems='甲乙丙丁戊己庚辛壬癸',branches='子丑寅卯辰巳午未申酉戌亥',els=['木','火','土','金','水'],stemEl=['木','木','火','火','土','土','金','金','水','水'],branchEl=['水','土','木','木','土','火','火','土','金','金','土','水'],zodiac=['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];function show(id){['start','intake','loading','result'].forEach(x=>document.querySelector('#'+x).classList.toggle('hide',x!==id));if(id==='intake')render()}function render(){document.querySelector('#decades').innerHTML='';for(let y=1900;y<=now;y+=10)document.querySelector('#decades').insertAdjacentHTML('beforeend',`<button type="button" class="${decade===y?'on':''}" onclick="setDecade(${y})">${y}年代</button>`);document.querySelector('#years').innerHTML='';for(let y=decade;y<Math.min(decade+10,now+1);y++)document.querySelector('#years').insertAdjacentHTML('beforeend',`<button type="button" class="${year===y?'on':''}" onclick="setYear(${y})">${y}</button>`);document.querySelector('#months').innerHTML='';for(let m=1;m<=12;m++)document.querySelector('#months').insertAdjacentHTML('beforeend',`<button type="button" class="${month===m?'on':''}" onclick="month=${m};render()">${m}月</button>`);let count=new Date(year,month,0).getDate();day=Math.min(day,count);document.querySelector('#days').innerHTML='';for(let d=1;d<=count;d++)document.querySelector('#days').insertAdjacentHTML('beforeend',`<button type="button" class="${day===d?'on':''}" onclick="day=${d};render()">${d}</button>`);let h=document.querySelector('#hour');if(!h.options.length)for(let i=0;i<24;i++)h.insertAdjacentHTML('beforeend',`<option value="${i}" ${i===9?'selected':''}>${String(i).padStart(2,'0')}时 · ${earth(i)}</option>`);document.querySelector('#dateText').textContent=`${year}年 ${month}月 ${day}日`;document.querySelector('#timeText').textContent=earth(+h.value)}function setDecade(v){decade=v;render()}function setYear(v){year=Math.max(1900,Math.min(now,v||1900));decade=Math.floor(year/10)*10;document.querySelector('#yearInput').value=year;render()}function earth(h){return branches[Math.floor(((h+1)%24)/2)]+'时'}function calculate(e){e.preventDefault();show('loading');setTimeout(makeResult,800)}function makeResult(){let yi=year-1984,mi=(month+1)%12,di=(Math.floor(Date.UTC(year,month-1,day)/86400000)+17)%60,hi=(+document.querySelector('#hour').value+1>>1)%12;let idx=[yi,mi+yi*12,di,hi+di*12],p=idx.map((n,i)=>({s:stems[(n%10+10)%10],b:branches[(n%12+12)%12],se:stemEl[(n%10+10)%10],be:branchEl[(n%12+12)%12]}));let counts={木:0,火:0,土:0,金:0,水:0};p.forEach(x=>{counts[x.se]++;counts[x.be]++});let dom=els.reduce((a,b)=>counts[b]>counts[a]?b:a),weak=els.reduce((a,b)=>counts[b]<counts[a]?b:a),story={木:['生发成势','重成长与连接，越有空间越能发挥。'],火:['明朗显化','重表达与影响，目标清晰时行动更快。'],土:['厚重承载','重秩序与稳定，善于把复杂事情落稳。'],金:['清晰取舍','重标准与效率，擅长判断与收束。'],水:['深思应变','重观察与变化，善于寻找新的出口。']}[dom];document.querySelector('#navName').textContent=document.querySelector('#name').value;document.querySelector('#birthLine').textContent=`${year}年${month}月${day}日 · ${zodiac[(yi%12+12)%12]}年 · ${earth(+document.querySelector('#hour').value)}`;document.querySelector('#mainTitle').textContent=story[0];document.querySelector('#mainSummary').textContent=story[1];document.querySelector('#pillars').innerHTML=p.map((x,i)=>`<article class="pillar"><span>${['年柱','月柱','日柱','时柱'][i]}</span><strong>${x.s}</strong><strong>${x.b}</strong><small>${x.se} · ${x.be}</small></article>`).join('');document.querySelector('#elements').innerHTML=els.map(x=>`<div class="bar"><span>${x}</span><i><b style="width:${Math.max(5,counts[x]/8*100)}%"></b></i><small>${counts[x]}</small></div>`).join('');document.querySelector('#facts').innerHTML=[['日主',p[2].s+p[2].se],['格局',dom+'势偏显'],['喜用',weak],['当前大运',(2020+(year+month)%10)+'—'+(2029+(year+month)%10)]].map(x=>`<div class="fact"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('');let labels=['性格命势','事业','财运','婚姻感情','子女家庭','健康节律'];document.querySelector('#domains').innerHTML=labels.map((x,i)=>`<article class="domain"><small>0${i+1}</small><h3>${x}</h3><i><b style="width:${55+(counts[els[i%5]]+i)%5*8}%"></b></i><p>${i%2?'机会来自协作与选择，避免同时铺开过多方向。':'当前更适合稳中推进，先建立清晰节奏。'}</p></article>`).join('');document.querySelector('#timeline').innerHTML=Array.from({length:8},(_,i)=>`<div><i style="height:${35+(i+counts[dom])%5*16}px"></i><b>${year+7+i*10}</b><span>${'启进守变升定收养'[i]}</span></div>`).join('');updateRelation();show('result')}function updateRelation(){let oy=+document.querySelector('#otherYear').value||1992,d=Math.abs(year%12-oy%12);document.querySelector('#relationTone').textContent=d<=2||d>=10?'互补相生':d<=5?'节奏有别':'张力明显';document.querySelector('#relationAdvice').textContent=d%2?'遇到分歧先确认彼此真正需要，再讨论方案。':'共同推进时先约定边界与复盘节点。'}render();
</script></body></html>
